<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Trainer Tracker"/>
  <title>Burkey's Trainer Tracker</title>
  <link rel="apple-touch-icon" href="apple-touch-icon.png"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
    :root{--ac:#4ade80;--acd:#0a0a0a;--bg:#0a0a0a;--card:#141414;--card2:#161616;--bd:#222;--bd2:#2a2a2a;--inp:#1a1a1a;--tx:#f0ede8;--mu:#888;--di:#555;--di2:#444;--ch:#1e1e1e;}
    html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'DM Mono',monospace;}
    body{max-width:430px;margin:0 auto;position:relative;overflow-x:hidden;}
    ::-webkit-scrollbar{display:none;}
    input,select,button{font-family:'DM Mono',monospace;}
    select{appearance:none;-webkit-appearance:none;}
    .btn{border:none;border-radius:8px;cursor:pointer;font-size:13px;padding:10px 18px;transition:all .15s;}
    .btn:active{transform:scale(.96);}
    .btn-p{background:var(--ac);color:var(--acd);font-weight:500;}
    .btn-g{background:var(--ch);color:var(--tx);border:1px solid var(--bd2);}
    .btn-d{background:#2a1111;color:#ff6b6b;border:1px solid #3a1a1a;}
    .chip{display:inline-flex;align-items:center;background:var(--ch);border:1px solid var(--bd2);border-radius:20px;padding:4px 12px;font-size:11px;cursor:pointer;white-space:nowrap;transition:all .12s;font-family:'DM Mono',monospace;}
    .chip.on{background:var(--ac);color:var(--acd);border-color:var(--ac);font-weight:500;}
    .inp{background:var(--inp);border:1px solid var(--bd2);border-radius:8px;color:var(--tx);padding:10px 12px;font-size:14px;width:100%;outline:none;}
    .inp:focus{border-color:var(--ac);}
    .card{background:var(--card);border:1px solid var(--bd);border-radius:12px;}
    .lbl{font-size:10px;color:var(--di);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;}
    .mo{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:fi .2s;}
    .md{background:#111;border-radius:20px 20px 0 0;width:100%;max-width:430px;max-height:92dvh;overflow-y:auto;animation:su .25s cubic-bezier(.34,1.56,.64,1);}
    .mp{padding:24px 20px 48px;}
    .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--ac);color:var(--acd);padding:10px 22px;border-radius:30px;font-size:13px;font-weight:500;z-index:200;animation:fi .2s;white-space:nowrap;pointer-events:none;}
    .tc{background:var(--card);border:1px solid var(--bd);border-radius:12px;margin-bottom:10px;cursor:pointer;overflow:hidden;}
    .wc{background:var(--card2);border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin-bottom:10px;}
    .lb{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:300;display:flex;align-items:center;justify-content:center;animation:fi .2s;cursor:zoom-out;}
    #nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#111;border-top:1px solid #1e1e1e;display:flex;padding:10px 0 28px;z-index:50;}
    #nav button{flex:1;background:none;border:none;cursor:pointer;color:var(--di);font-size:10px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.03em;padding:4px 2px;transition:color .15s;}
    #nav button.on{color:var(--ac);}
    #fab{position:fixed;bottom:80px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--ac);border:none;cursor:pointer;font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(74,222,128,.35);z-index:50;color:var(--acd);}
    #fab:active{transform:scale(.92);}
    .pbtn{width:100%;border:1px dashed #333;border-radius:10px;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--mu);background:var(--ch);cursor:pointer;}
    .bbg{background:var(--ch);border-radius:4px;height:4px;}
    .bfl{background:var(--ac);border-radius:4px;height:4px;transition:width .4s;}
    .stag{display:inline-flex;align-items:center;background:var(--ch);border:1px solid var(--bd2);border-radius:20px;padding:4px 6px 4px 12px;gap:6px;}
    .stag span{font-size:12px;}
    .stag button{background:none;border:none;color:var(--di);cursor:pointer;font-size:14px;line-height:1;padding:0;}
    .crow{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;}
    .sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
    .scard{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:16px;}
    .ggrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .gi{cursor:pointer;border-radius:10px;overflow:hidden;position:relative;border:1px solid var(--bd);}
    .gi img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;}
    .gcap{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.85));padding:24px 10px 10px;}
    .hidden{display:none!important;}
    .bb{font-family:'Bebas Neue',sans-serif;}
    #hdr{padding:52px 20px 0;}
    #cnt{padding:16px 20px 100px;}
    @keyframes fi{from{opacity:0}to{opacity:1}}
    @keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
  </style>
</head>
<body>
<div id="app"></div>
<script>
const SK='burkeys-trainer-tracker';
const WS=['☀️ Sunny','⛅ Cloudy','🌧️ Rainy','❄️ Cold','🌫️ Foggy','🌬️ Windy'];
const OC=['Everyday','Work','Gym / Training','Sport','Night Out','Travel','Special Event'];
const SZ=Array.from({length:17},(_,i)=>(6+i*.5).toFixed(1).replace('.0',''));

let S={data:{trainers:[],wears:[],customStyles:[],customOccasions:[]},tab:0,search:'',sf:'brand',sa:true,fs:'All',modal:null,sel:null,form:{},wf:{},lb:null,nsi:'',toast:null,tt:null};

function shape(p){return{trainers:Array.isArray(p?.trainers)?p.trainers:[],wears:Array.isArray(p?.wears)?p.wears:[],customStyles:Array.isArray(p?.customStyles)?p.customStyles:[],customOccasions:Array.isArray(p?.customOccasions)?p.customOccasions:[]};}
function load(){try{const r=localStorage.getItem(SK);return r?shape(JSON.parse(r)):shape({});}catch{return shape({});}}
function save(){try{localStorage.setItem(SK,JSON.stringify(S.data));}catch{}}
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}

function toast(msg){if(S.tt)clearTimeout(S.tt);S.toast=msg;render();S.tt=setTimeout(()=>{S.toast=null;render();},2500);}

function exportData(){const j=JSON.stringify(S.data,null,2);const b=new Blob([j],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='burkeys-trainers-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(u);toast('Exported! Save to iCloud Drive 📁');}
function importData(f){const r=new FileReader();r.onload=ev=>{try{const s=shape(JSON.parse(ev.target.result));S.data=s;save();toast('Imported '+s.trainers.length+' trainers ✅');render();}catch{toast('Import failed — invalid file');}};r.readAsText(f);}

function compress(file,compact,cb){const img=new Image();const u=URL.createObjectURL(file);img.onload=()=>{const mw=compact?400:800;const sc=Math.min(1,mw/img.width);const c=document.createElement('canvas');c.width=img.width*sc;c.height=img.height*sc;c.getContext('2d').drawImage(img,0,0,c.width,c.height);cb(c.toDataURL('image/jpeg',.75));URL.revokeObjectURL(u);};img.src=u;}

function el(tag,attrs={},...kids){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(k==='cls')e.className=v;
    else if(k.startsWith('on')&&typeof v==='function')e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='css'&&typeof v==='object')Object.assign(e.style,v);
    else e.setAttribute(k,v);
  }
  for(const c of kids){if(c==null||c===false)continue;e.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(c):c);}
  return e;
}
function chip(lbl,on,fn){return el('button',{cls:'chip'+(on?' on':''),onClick:fn},lbl);}

function photoPicker(val,onChange,lbl,compact){
  const w=el('div');
  if(val){
    const img=el('img',{src:val,alt:'',css:{width:'100%',height:compact?'120px':'200px',objectFit:'cover',borderRadius:'10px',display:'block',border:'1px solid #2a2a2a'}});
    const fi=el('input',{type:'file',accept:'image/*',cls:'hidden'});fi.setAttribute('capture','environment');
    fi.addEventListener('change',e=>{if(e.target.files[0])compress(e.target.files[0],compact,v=>onChange(v));});
    w.append(img,fi,el('div',{css:{display:'flex',gap:'8px',marginTop:'8px'}},
      el('button',{cls:'btn btn-g',css:{flex:1,padding:'8px 0',fontSize:'12px'},onClick:()=>fi.click()},'Change photo'),
      el('button',{cls:'btn btn-d',css:{padding:'8px 14px',fontSize:'12px'},onClick:()=>onChange(null)},'Remove')
    ));
  }else{
    const fi=el('input',{type:'file',accept:'image/*',cls:'hidden'});fi.setAttribute('capture','environment');
    fi.addEventListener('change',e=>{if(e.target.files[0])compress(e.target.files[0],compact,v=>onChange(v));});
    w.append(fi,el('button',{cls:'btn btn-g pbtn',css:{padding:compact?'12px':'16px',fontSize:'13px'},onClick:()=>fi.click()},el('span',{css:{fontSize:'20px'}},'📷'),' '+lbl));
  }
  return w;
}

function twears(){return S.data.trainers.map(t=>{const ws=S.data.wears.filter(w=>w.trainerId===t.id);return{...t,wears:ws.length,lastWorn:[...ws].sort((a,b)=>b.date.localeCompare(a.date))[0]?.date||null};});}
function filtered(){const q=S.search.toLowerCase();return twears().filter(t=>(t.brand.toLowerCase().includes(q)||t.colourway.toLowerCase().includes(q)||(t.style||'').toLowerCase().includes(q)||(t.name||'').toLowerCase().includes(q))&&(S.fs==='All'||t.style===S.fs)).sort((a,b)=>{let av=a[S.sf],bv=b[S.sf];if(S.sf==='size'){av=parseFloat(av);bv=parseFloat(bv);}if(av==null)return 1;if(bv==null)return-1;return S.sa?(av>bv?1:-1):(av<bv?1:-1);});}

function render(){
  const app=document.getElementById('app');
  app.innerHTML='';
  if(S.lb)app.appendChild(el('div',{cls:'lb',onClick:()=>{S.lb=null;render();}},el('img',{src:S.lb,alt:'',css:{maxWidth:'95%',maxHeight:'90dvh',borderRadius:'12px',objectFit:'contain'}})));
  if(S.modal)app.appendChild(renderModal());
  if(S.toast)app.appendChild(el('div',{cls:'toast'},S.toast));

  const fstyles=['All',...new Set(S.data.trainers.map(t=>t.style).filter(Boolean))];
  app.appendChild(el('div',{id:'hdr'},
    el('div',{css:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
      el('div',{},
        el('div',{css:{fontSize:'11px',color:'var(--di)',letterSpacing:'.15em',textTransform:'uppercase',marginBottom:'4px'}},'Your Collection'),
        el('div',{cls:'bb',css:{fontSize:'52px',lineHeight:1,letterSpacing:'.02em'}},"BURKEY'S",el('br'),'TRAINER',el('br'),'TRACKER')
      )
    ),
    el('div',{cls:'crow',css:{marginTop:'16px'}},
      chip('👟 Collection',S.tab===0,()=>{S.tab=0;render();}),
      chip('🖼️ Gallery',S.tab===1,()=>{S.tab=1;render();}),
      chip('📊 Stats',S.tab===2,()=>{S.tab=2;render();})
    )
  ));

  const cnt=el('div',{id:'cnt'});
  if(S.tab===0)cnt.appendChild(renderCollection(fstyles));
  if(S.tab===1)cnt.appendChild(renderGallery());
  if(S.tab===2)cnt.appendChild(renderStats());
  app.appendChild(cnt);

  if(S.tab===0)app.appendChild(el('button',{id:'fab',onClick:openAdd},'＋'));
  app.appendChild(el('div',{id:'nav'},
    el('button',{cls:S.tab===0?'on':'',onClick:()=>{S.tab=0;render();}},'👟 Collection'),
    el('button',{cls:S.tab===1?'on':'',onClick:()=>{S.tab=1;render();}},'🖼️ Gallery'),
    el('button',{cls:S.tab===2?'on':'',onClick:()=>{S.tab=2;render();}},'📊 Stats')
  ));
}

function renderCollection(fstyles){
  const w=el('div');
  const SORTS=['brand','style','colourway','wears'];
  const si=el('input',{cls:'inp',placeholder:'Search brand, colourway...',value:S.search,css:{marginBottom:'12px'}});
  si.addEventListener('input',e=>{S.search=e.target.value;render();});
  w.appendChild(si);
  const fr=el('div',{cls:'crow',css:{marginBottom:'12px'}});
  for(const s of fstyles)fr.appendChild(chip(s,S.fs===s,()=>{S.fs=s;render();}));
  w.appendChild(fr);
  const sr=el('div',{cls:'crow',css:{marginBottom:'16px',alignItems:'center'}});
  sr.appendChild(el('span',{css:{fontSize:'11px',color:'var(--di)',textTransform:'uppercase',letterSpacing:'.08em',flexShrink:0}},'Sort:'));
  for(const f of SORTS){const lbl=(f==='wears'?'👟':f[0].toUpperCase()+f.slice(1))+(S.sf===f?(S.sa?' ↑':' ↓'):'');sr.appendChild(chip(lbl,S.sf===f,()=>{if(S.sf===f)S.sa=!S.sa;else{S.sf=f;S.sa=true;}render();}));}
  w.appendChild(sr);
  const ts=filtered();
  if(!ts.length){w.appendChild(el('div',{css:{textAlign:'center',padding:'60px 0',color:'var(--di2)'}},el('div',{css:{fontSize:'40px',marginBottom:'12px'}},'👟'),el('div',{css:{fontSize:'14px'}},'No trainers yet. Add your first pair!')));}
  for(const t of ts){
    const card=el('div',{cls:'tc',onClick:()=>openDetail(t)});
    if(t.photo)card.appendChild(el('img',{src:t.photo,alt:t.brand,css:{width:'100%',height:'160px',objectFit:'cover',display:'block'}}));
    card.appendChild(el('div',{css:{padding:'14px 16px'}},
      el('div',{css:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
        el('div',{css:{flex:1}},el('div',{cls:'bb',css:{fontSize:'22px',letterSpacing:'.04em',lineHeight:1.1}},t.name||t.brand),el('div',{css:{fontSize:'12px',color:'var(--mu)',marginTop:'2px'}},t.name?t.brand:t.colourway)),
        el('div',{css:{textAlign:'right'}},el('div',{cls:'bb',css:{fontSize:'32px',color:'var(--ac)',lineHeight:1}},String(t.wears)),el('div',{css:{fontSize:'10px',color:'var(--di)',textTransform:'uppercase'}},'wears'))
      ),
      el('div',{css:{display:'flex',gap:'6px',marginTop:'10px',flexWrap:'wrap'}},
        ...(t.style?[el('span',{cls:'chip'},t.style)]:[]),
        el('span',{cls:'chip'},'UK '+t.size),
        ...(t.lastWorn?[el('span',{cls:'chip'},'Last: '+t.lastWorn)]:[])
      )
    ));
    w.appendChild(card);
  }
  return w;
}

function renderGallery(){
  const w=el('div');
  const withPhotos=S.data.trainers.filter(t=>t.photo);
  if(!withPhotos.length){
    w.appendChild(el('div',{css:{textAlign:'center',padding:'60px 0',color:'var(--di2)'}},el('div',{css:{fontSize:'40px',marginBottom:'12px'}},'🖼️'),el('div',{css:{fontSize:'14px'}},'No photos yet.',el('br'),'Add photos to your trainers to see them here.')));
    return w;
  }
  const grid=el('div',{cls:'ggrid'});
  for(const t of withPhotos){
    const item=el('div',{cls:'gi',onClick:()=>openDetail(t)});
    item.appendChild(el('img',{src:t.photo,alt:t.brand}));
    item.appendChild(el('div',{cls:'gcap'},
      el('div',{cls:'bb',css:{fontSize:'16px',letterSpacing:'.04em',lineHeight:1.1}},t.name||t.brand),
    ));
    grid.appendChild(item);
  }
  w.appendChild(grid);
  return w;
}

function renderStats(){
  const w=el('div');
  const allStyles=S.data.customStyles;
  const total=S.data.wears.length;
  const top=[...twears()].sort((a,b)=>b.wears-a.wears)[0];
  const grid=el('div',{cls:'sgrid'});
  for(const s of[{l:'Total Pairs',v:S.data.trainers.length},{l:'Total Wears',v:total},{l:'Most Worn',v:top?(top.name||top.brand):'—'},{l:'Avg Wears',v:S.data.trainers.length?(total/S.data.trainers.length).toFixed(1):'0'}])
    grid.appendChild(el('div',{cls:'scard'},el('div',{cls:'lbl'},s.l),el('div',{cls:'bb',css:{fontSize:'28px',color:'var(--ac)'}},String(s.v))));
  w.appendChild(grid);
  const sorted=[...twears()].sort((a,b)=>b.wears-a.wears);
  const wtbl=el('div',{cls:'card',css:{padding:'16px',marginBottom:'16px'}},el('div',{cls:'lbl',css:{marginBottom:'10px'}},'All Pairs by Wears'));
  if(!sorted.length){wtbl.appendChild(el('div',{css:{color:'var(--di2)',fontSize:'13px'}},'No trainers yet'));}
  else{
    const hdr=el('div',{css:{display:'flex',justifyContent:'space-between',paddingBottom:'8px',marginBottom:'8px',borderBottom:'1px solid var(--bd)'}});
    hdr.appendChild(el('span',{css:{fontSize:'10px',color:'var(--di)',textTransform:'uppercase',letterSpacing:'.08em'}},'Name'));
    hdr.appendChild(el('span',{css:{fontSize:'10px',color:'var(--di)',textTransform:'uppercase',letterSpacing:'.08em'}},'Wears'));
    wtbl.appendChild(hdr);
    for(const t of sorted){
      const row=el('div',{css:{display:'flex',justifyContent:'space-between',alignItems:'baseline',padding:'6px 0',borderBottom:'1px solid var(--bd)'}});
      const left=el('div',{});
      left.appendChild(el('div',{css:{fontSize:'13px'}},t.name||t.brand));
      if(t.name)left.appendChild(el('div',{css:{fontSize:'11px',color:'var(--di)',marginTop:'1px'}},t.brand));
      row.appendChild(left);
      row.appendChild(el('div',{cls:'bb',css:{fontSize:'20px',color:t.wears>0?'var(--ac)':'var(--di2)'}},String(t.wears)));
      wtbl.appendChild(row);
    }
  }
  w.appendChild(wtbl);

  if(allStyles.length){
    const wbs={};for(const s of allStyles)wbs[s]=S.data.wears.filter(w=>S.data.trainers.find(t=>t.id===w.trainerId)?.style===s).length;
    const sc=el('div',{cls:'card',css:{padding:'16px',marginBottom:'16px'}},el('div',{cls:'lbl',css:{marginBottom:'10px'}},'Wears by Style'));
    if(!allStyles.some(s=>wbs[s]>0))sc.appendChild(el('div',{css:{color:'var(--di2)',fontSize:'13px'}},'No wear data yet'));
    for(const s of allStyles.filter(s=>wbs[s]>0).sort((a,b)=>wbs[b]-wbs[a])){const pct=Math.round((wbs[s]/total)*100);sc.appendChild(el('div',{css:{marginBottom:'8px'}},el('div',{css:{display:'flex',justifyContent:'space-between',marginBottom:'4px'}},el('span',{css:{fontSize:'12px'}},s),el('span',{css:{fontSize:'12px',color:'var(--ac)'}},String(wbs[s]))),el('div',{cls:'bbg'},el('div',{cls:'bfl',css:{width:pct+'%'}}))));}
    w.appendChild(sc);
  }


  const sc2=el('div',{cls:'card',css:{padding:'16px',marginBottom:'16px'}},el('div',{cls:'lbl',css:{marginBottom:'10px'}},'Manage Styles'));
  if(!allStyles.length)sc2.appendChild(el('div',{css:{color:'var(--di2)',fontSize:'13px',marginBottom:'10px'}},'No styles added yet'));
  const tw=el('div',{css:{display:'flex',gap:'6px',flexWrap:'wrap',marginBottom:allStyles.length?'12px':'0'}});
  for(const s of allStyles){tw.appendChild(el('div',{cls:'stag'},el('span',{},s),el('button',{onClick:()=>{S.data.customStyles=S.data.customStyles.filter(c=>c!==s);save();render();}},'✕')));}
  sc2.appendChild(tw);
  const nsi=el('input',{cls:'inp',placeholder:'New style...',value:S.nsi,css:{flex:1,padding:'8px 12px',fontSize:'13px'}});
  nsi.addEventListener('input',e=>{S.nsi=e.target.value;});
  nsi.addEventListener('keydown',e=>{if(e.key==='Enter')addStyle();});
  sc2.appendChild(el('div',{css:{display:'flex',gap:'8px'}},nsi,el('button',{cls:'btn btn-p',css:{padding:'8px 14px',fontSize:'13px',flexShrink:0},onClick:addStyle},'+ Add')));
  w.appendChild(sc2);

  w.appendChild(el('div',{cls:'lbl',css:{marginBottom:'10px'}},'Recent Activity'));
  const rec=[...S.data.wears].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5).map(w=>({...w,trainer:S.data.trainers.find(t=>t.id===w.trainerId)}));
  if(!rec.length)w.appendChild(el('div',{css:{color:'var(--di2)',fontSize:'13px'}},'No wears logged yet'));
  for(const wr of rec){
    const rc=el('div',{cls:'wc',css:{display:'flex'}});
    if(wr.photo){const img=el('img',{src:wr.photo,alt:'',css:{width:'72px',height:'72px',objectFit:'cover',flexShrink:0,cursor:'pointer'}});img.addEventListener('click',()=>{S.lb=wr.photo;render();});rc.appendChild(img);}
    else rc.appendChild(el('div',{css:{width:'72px',height:'72px',background:'#1a1a1a',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'24px'}},'👟'));
    rc.appendChild(el('div',{css:{padding:'12px 14px',flex:1}},el('div',{cls:'bb',css:{fontSize:'18px',lineHeight:1}},wr.trainer?.name||wr.trainer?.brand||'Unknown'),el('div',{css:{fontSize:'12px',color:'var(--di)',marginTop:'3px'}},[wr.occasion,wr.weather].filter(Boolean).join(' · ')||'—'),el('div',{css:{fontSize:'11px',color:'var(--di2)',marginTop:'2px'}},wr.date)));
    w.appendChild(rc);
  }
  const ii=el('input',{type:'file',accept:'.json',cls:'hidden'});ii.addEventListener('change',e=>{if(e.target.files[0])importData(e.target.files[0]);e.target.value='';});

function openAdd(){S.form={brand:'',style:S.data.customStyles[0]||'',colourway:'',size:'10',photo:null};S.modal='add';render();}
